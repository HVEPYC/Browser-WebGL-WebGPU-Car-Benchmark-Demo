<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chassis — Cinematic Track</title>
<style>
  :root {
    --ink: #0a0e14;
    --panel: rgba(14, 20, 30, 0.72);
    --line: rgba(120, 200, 255, 0.18);
    --hot: #4dd0ff;
    --hot-dim: #7a90a8;
    --amber: #ffb14d;
    --good: #5cffb1;
    --warn: #ff6b6b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  body {
    font-family: ui-monospace, "SF Mono", "Roboto Mono", Menlo, monospace;
    color: #dfe9f5;
    -webkit-font-smoothing: antialiased;
  }
  /* Canvas renders at a fixed 1920x1080 buffer; JS sets its CSS size/offset to
     fit the screen, centered. The black body shows through as letterbox bars. */
  #scene { position: fixed; display: block; }

  .hud {
    position: fixed; top: 16px; left: 16px; width: 268px;
    background: var(--panel);
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 14px 16px 16px; z-index: 10; pointer-events: none;
  }
  .hud h1 { font-size: 10px; letter-spacing: 0.34em; font-weight: 700; color: var(--hot); text-transform: uppercase; margin-bottom: 2px; }
  .hud .sub { font-size: 9px; letter-spacing: 0.18em; color: var(--hot-dim); text-transform: uppercase; margin-bottom: 14px; }
  .row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; border-bottom: 1px solid rgba(120,200,255,0.06); }
  .row:last-child { border-bottom: none; }
  .k { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--hot-dim); }
  .v { font-size: 12px; font-variant-numeric: tabular-nums; color: #eaf3ff; text-align: right; }
  .v.api { color: var(--amber); font-size: 10px; letter-spacing: 0.04em; max-width: 150px; }
  .v.big { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  .v.good { color: var(--good); }
  .v.warn { color: var(--warn); }

  .spark-wrap { margin-top: 12px; }
  .spark-label { display: flex; justify-content: space-between; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--hot-dim); margin-bottom: 5px; }
  #spark { display: block; width: 100%; height: 40px; border: 1px solid rgba(120,200,255,0.1); border-radius: 3px; }

  .shot {
    position: fixed; bottom: 72px; left: 20px; z-index: 10; pointer-events: none;
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: #eaf3ff;
    text-shadow: 0 1px 8px rgba(0,0,0,0.8);
  }
  .shot .cam { color: var(--amber); }
  .shot .eyebrow { display:block; font-size: 8px; letter-spacing: 0.34em; color: var(--hot-dim); margin-bottom: 3px; }

  .bar { position: fixed; left: 0; width: 100%; height: 6vh; background: #000; z-index: 9; pointer-events: none; }
  .bar.top { top: 0; } .bar.bottom { bottom: 0; }

  /* backend label, centered above the render viewport */
  .render-label {
    position: fixed; top: calc(6vh + 12px); left: 50%; transform: translateX(-50%);
    z-index: 11; pointer-events: none;
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; font-weight: 700;
    color: #eaf3ff; background: rgba(10,14,20,0.7);
    border: 1px solid var(--line); border-radius: 4px; padding: 7px 14px;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }
  .render-label .rl-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--hot); box-shadow: 0 0 8px var(--hot); }
  .render-label.gpu .rl-dot { background: var(--good); box-shadow: 0 0 8px var(--good); }
  .render-label .rl-api { color: var(--hot); }
  .render-label.gpu .rl-api { color: var(--good); }

  .controls { position: fixed; bottom: 14px; left: 20px; right: 20px; z-index: 20; display: flex; flex-wrap: wrap; gap: 10px; }
  .ctl {
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    appearance: none; cursor: pointer; user-select: none;
    font-family: inherit; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: #eaf3ff; background: var(--panel);
    backdrop-filter: blur(14px) saturate(1.4); -webkit-backdrop-filter: blur(14px) saturate(1.4);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 12px 16px; min-height: 44px;
    transition: transform .06s ease, border-color .15s ease, color .15s ease;
  }
  .ctl:active { transform: scale(0.95); border-color: var(--hot); }
  .ctl.off { color: var(--hot-dim); border-color: rgba(120,200,255,0.1); }
  .ctl.bench { color: var(--amber); border-color: rgba(255,177,77,0.4); }
  .ctl.bench.running { color: var(--warn); border-color: rgba(255,107,107,0.6); }
  .ctl.api-toggle { color: var(--good); border-color: rgba(92,255,177,0.35); }
  .ctl.api-toggle.disabled { color: var(--hot-dim); border-color: rgba(120,200,255,0.1); cursor: not-allowed; opacity: 0.55; }
  .ctl.src { display: inline-flex; align-items: center; gap: 7px; text-decoration: none; color: var(--hot-dim); border-color: rgba(120,200,255,0.14); }
  .ctl.src:hover { color: #eaf3ff; border-color: var(--hot); }
  .ctl.src svg { display: block; opacity: 0.85; }
  .ctl.uncap { color: var(--amber); border-color: rgba(255,177,77,0.4); }
  .ctl.uncap.off { color: var(--hot-dim); border-color: rgba(120,200,255,0.1); }

  /* benchmark status banner, centered up top */
  .bench-banner {
    position: fixed; top: 8vh; left: 50%; transform: translateX(-50%);
    z-index: 30; pointer-events: none; text-align: center;
    background: rgba(10,14,20,0.85); border: 1px solid rgba(255,177,77,0.4);
    border-radius: 4px; padding: 10px 20px; display: none;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  }
  .bench-banner.show { display: block; }
  .bench-banner .t { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--amber); }
  .bench-banner .n { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; color: #eaf3ff; margin-top: 3px; }
  .bench-banner .bar-track { width: 200px; height: 3px; background: rgba(255,255,255,0.12); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .bench-banner .bar-fill { height: 100%; width: 0%; background: var(--amber); transition: width .1s linear; }
  .badge { position: fixed; bottom: 14px; right: 16px; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--hot-dim); z-index: 10; pointer-events: none; }
  .dot { display:inline-block; width:6px; height:6px; border-radius:50%; background: var(--good); margin-right:6px; vertical-align: middle; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* results popup shown when a benchmark finishes */
  .results-overlay {
    position: fixed; inset: 0; z-index: 50; display: none;
    align-items: center; justify-content: center;
    background: rgba(3,6,10,0.72); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    padding: 20px;
  }
  .results-overlay.show { display: flex; }
  .results-modal {
    position: relative; width: 100%; max-width: 360px; max-height: 92vh; overflow-y: auto;
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    backdrop-filter: blur(16px) saturate(1.4); -webkit-backdrop-filter: blur(16px) saturate(1.4);
    padding: 20px 20px 18px; text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  }
  .results-close {
    position: absolute; top: 8px; right: 10px; z-index: 2;
    appearance: none; border: none; background: none; cursor: pointer;
    color: var(--hot-dim); font-size: 22px; line-height: 1; padding: 4px 8px;
    font-family: inherit; transition: color .15s ease;
  }
  .results-close:hover { color: #eaf3ff; }
  .results-head { margin-bottom: 14px; }
  .results-eyebrow { display: block; font-size: 8px; letter-spacing: 0.34em; text-transform: uppercase; color: var(--hot-dim); margin-bottom: 4px; }
  .results-title { display: block; font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--hot); font-weight: 700; }
  .results-card-wrap { margin: 0 auto 16px; max-width: 260px; }
  .results-card-img { width: 100%; height: auto; display: block; border-radius: 8px; border: 1px solid rgba(120,200,255,0.12); }
  .results-prompt { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--hot-dim); margin-bottom: 10px; }
  .results-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 14px; }
  .rbtn {
    appearance: none; cursor: pointer; user-select: none; font-family: inherit;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: #eaf3ff; background: rgba(77,208,255,0.08);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 11px 12px; min-height: 42px; flex: 1 1 0; min-width: 88px;
    transition: transform .06s ease, border-color .15s ease, background .15s ease;
  }
  .rbtn:active { transform: scale(0.95); }
  .rbtn.primary:hover { border-color: var(--hot); background: rgba(77,208,255,0.16); }
  .results-src {
    display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--hot-dim);
    transition: color .15s ease;
  }
  .results-src:hover { color: var(--hot); }

  @media (max-width: 520px) {
    .hud { width: 210px; top: 12px; left: 12px; padding: 12px; }
    .shot { font-size: 10px; bottom: 108px; }
    .ctl { font-size: 9px; padding: 10px 12px; letter-spacing: 0.1em; min-height: 40px; }
    .controls { gap: 8px; left: 12px; right: 12px; bottom: 12px; }
    .controls .ctl { flex: 1 1 auto; justify-content: center; text-align: center; white-space: nowrap; }
    /* keep the "Live" badge above the (possibly two-row) controls so they don't overlap */
    .badge { bottom: auto; top: 12px; right: 12px; }
  }
</style>
</head>

<canvas id="scene"></canvas>
<div class="render-label" id="render-label">—</div>

<div class="hud">

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
  "three/webgpu": "https://unpkg.com/three@0.160.0/examples/jsm/renderers/webgpu/WebGPURenderer.js",
  "three/webgpu-capabilities": "https://unpkg.com/three@0.160.0/examples/jsm/capabilities/WebGPU.js"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const RENDER_W = 1920, RENDER_H = 1080;   // fixed internal render viewport
const canvas = document.getElementById('scene');

// ============ BACKEND SELECTION (WebGL / WebGPU) ============
// The desired backend is read from the ?api= URL param so a swap survives the
// page reload we use to rebuild the renderer cleanly. Availability of WebGPU is
// probed up front; if unsupported we silently fall back to WebGL and disable the
// toggle. `backend` is the string we actually end up running on.
const urlParams = new URLSearchParams(location.search);
let requestedBackend = urlParams.get('api');            // 'webgpu' | 'webgl' | null

async function detectWebGPU(){
  // Prefer three's own capability probe, fall back to a direct adapter request.
  try {
    const { default: WebGPUCap } = await import('three/webgpu-capabilities');
    if (WebGPUCap && typeof WebGPUCap.isAvailable === 'function') return !!WebGPUCap.isAvailable();
  } catch(e){}
  if (!('gpu' in navigator)) return false;
  try { return !!(await navigator.gpu.requestAdapter()); } catch(e){ return false; }
}

const webgpuSupported = await detectWebGPU();

// Resolve the backend actually used this session.
let backend;
if (requestedBackend === 'webgpu' && webgpuSupported) backend = 'webgpu';
else backend = 'webgl';   // default, and the fallback when WebGPU is requested but absent

// Build the renderer for the chosen backend. WebGPURenderer needs an async
// init() before first render; WebGLRenderer is ready immediately. We expose a
// tiny uniform surface (backendLabel, gpuName, drawCalls, triangles) so the rest
// of the app doesn't care which renderer.info shape it's talking to.
let renderer, backendLabel = '—', gpuName = 'Unknown';

async function buildRenderer(){
  if (backend === 'webgpu'){
    const { default: WebGPURenderer } = await import('three/webgpu');
    renderer = new WebGPURenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(1);
    renderer.setSize(RENDER_W, RENDER_H, false);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    await renderer.init();
    backendLabel = 'WebGPU (via three.js)';
    // WebGPU intentionally hides adapter/vendor strings for privacy; there's no
    // UNMASKED_RENDERER equivalent. Report what the adapter exposes, if anything.
    try {
      const info = renderer.backend?.adapter?.info || navigator.gpu?.__adapterInfo;
      const bits = [info?.vendor, info?.architecture, info?.description].filter(Boolean);
      gpuName = bits.length ? bits.join(' · ') : 'WebGPU adapter (details hidden by browser)';
    } catch(e){ gpuName = 'WebGPU adapter (details hidden by browser)'; }
  } else {
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
    // Always render at exactly 1920x1080 into the drawing buffer, regardless of the
    // device screen or orientation. CSS then scales the canvas to fit (letterboxed).
    renderer.setPixelRatio(1);
    renderer.setSize(RENDER_W, RENDER_H, false);  // false = don't touch CSS size
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    const gl = renderer.getContext();
    const isGL2 = (typeof WebGL2RenderingContext !== 'undefined') && (gl instanceof WebGL2RenderingContext);
    backendLabel = (isGL2 ? 'WebGL 2.0' : 'WebGL 1.0') + ' (via three.js)';
    try {
      const dbg = gl.getExtension('WEBGL_debug_renderer_info');
      gpuName = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER);
    } catch(e){}
  }
}

await buildRenderer();

// Reflect the resolved backend + GPU in the HUD.
document.getElementById('api').textContent = backendLabel;
document.getElementById('gpu').textContent = gpuName;

// Prominent backend label above the render viewport.
(function setRenderLabel(){
  const el = document.getElementById('render-label');
  const isGPU = (backend === 'webgpu');
  const apiName = isGPU ? 'WebGPU' : (backendLabel.startsWith('WebGL 2') ? 'WebGL 2' : 'WebGL');
  el.classList.toggle('gpu', isGPU);
  el.innerHTML = '<span class="rl-dot"></span>Rendering via <span class="rl-api">' + apiName + '</span>';
})();

// Uniform per-frame metric accessors that work across both renderer.info shapes.
// WebGPURenderer.info also nests render.{drawCalls,triangles}; older paths differ,
// so we defensively read both spellings.
function drawCalls(){
  const r = renderer.info?.render || {};
  return r.calls ?? r.drawCalls ?? 0;
}
function triangleCount(){
  const r = renderer.info?.render || {};
  return r.triangles ?? 0;
}

// JS heap memory. performance.memory is a non-standard Chromium API (Chrome/Edge)
// and is the only in-page signal for how much RAM the benchmark is actually using
// vs. how much the engine will let it have. Absent (Firefox/Safari) -> null, and
// callers show "n/a". Values are in bytes; we surface MB.
function memoryInfo(){
  const m = (performance && performance.memory) ? performance.memory : null;
  if (!m) return null;
  return {
    usedMB:  m.usedJSHeapSize  / 1048576,   // heap currently in use by the app
    totalMB: m.totalJSHeapSize / 1048576,   // heap currently allocated to the app
    limitMB: m.jsHeapSizeLimit / 1048576,   // ceiling the engine will grant
  };
}
function fmtMB(v){ return v >= 1024 ? (v/1024).toFixed(2) + ' GB' : v.toFixed(0) + ' MB'; }

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0e14);
scene.fog = new THREE.Fog(0x0a0e14, 40, 130);

const camera = new THREE.PerspectiveCamera(38, RENDER_W/RENDER_H, 0.1, 400);
camera.position.set(0, 8, 20);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

// ---- lights ----
// Main sun / key light. Its shadow frustum is kept tight and re-centred on the
// car each frame (see updateLighting), so the 2048² shadow map concentrates its
// resolution where the camera is actually looking — much crisper real-time
// shadows than spreading one map across the whole track.

// =================== TERRAIN ELEVATION ======================================
// The single source of truth for the road's height at any point along the loop.
// The road mesh, the car body, and its suspension all sample this same function
// so everything stays perfectly consistent. `u` is the 0..1 track parameter.
// Several sine waves at different frequencies give rolling hills, dips, and a
// couple of sharper crests without any discontinuity at the u=0/u=1 seam
// (all periods divide evenly into a full loop).
function roadHeight(u){
  const a = Math.sin(u * Math.PI * 2 * 3) * 2.6;   // 3 big rolls per lap
  const b = Math.sin(u * Math.PI * 2 * 6 + 1.3) * 1.1; // 6 smaller undulations
  const c = Math.sin(u * Math.PI * 2 * 11 + 0.6) * 0.35; // fine ripples
  return a + b + c;
}

// The terrain (roadHeight) dips below y=0, so the flat ground and grid must sit
// beneath its lowest point or they'd float above — and occlude — the road in
// dips. roadHeight's amplitude sums to about 4.05, so -6 clears it with margin.

// Build a ribbon strip of given half-width, sitting `yOffset` above the terrain.
function buildRibbon(halfW, yOffset, material, uvRepeat){
  const N = 500;
  const positions = [], uvs = [], indices = [];
  for (let i=0;i<=N;i++){
    const tt = (i % N)/N;
    const p = track.getPointAt(tt);
    const t = track.getTangentAt(tt);
    const side = new THREE.Vector3(-t.z, 0, t.x).normalize();
    const h = roadHeight(tt) + yOffset;          // lift onto the terrain
    const left  = p.clone().addScaledVector(side,  halfW);
    const right = p.clone().addScaledVector(side, -halfW);
    positions.push(left.x, h, left.z, right.x, h, right.z);
    uvs.push(0, (i/N)*uvRepeat, 1, (i/N)*uvRepeat);
    // Winding: order the two triangles so their front faces point UP. Traversing
    // the track (+tt) with left at +side and right at -side, this order gives an
    // upward normal. computeVertexNormals then confirms it per-vertex.
    if (i < N){ const a=i*2,b=i*2+1,c=i*2+2,d=i*2+3; indices.push(a,c,b, b,c,d); }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
  g.setAttribute('uv', new THREE.Float32BufferAttribute(uvs,2));
  g.setIndex(indices); g.computeVertexNormals();
  // Render both sides so the surface is never culled from the camera angles the
  // cinematic shots use (some skim right at road level).
  material.side = THREE.DoubleSide;
  const mesh = new THREE.Mesh(g, material);
  mesh.receiveShadow = true; scene.add(mesh); return mesh;
}

function asphaltTexture(){
  const c = document.createElement('canvas'); c.width=256; c.height=1024;
  const x = c.getContext('2d');
  // base asphalt with grain
  x.fillStyle = '#1b1f25'; x.fillRect(0,0,256,1024);
  for(let i=0;i<4000;i++){
    const g = 20 + Math.random()*26;
    x.fillStyle = `rgb(${g},${g+3},${g+7})`;
    x.fillRect(Math.random()*256, Math.random()*1024, 1.5, 1.5);
  }
  // subtle darker tyre-wear bands in each lane
  x.fillStyle = 'rgba(0,0,0,0.18)';
  x.fillRect(74, 0, 26, 1024); x.fillRect(156, 0, 26, 1024);
  // solid white edge lines
  x.fillStyle = '#d7dde4';
  x.fillRect(14, 0, 6, 1024); x.fillRect(236, 0, 6, 1024);
  // dashed yellow centre line
  x.fillStyle = '#e8c14a';
  for(let y=0; y<1024; y+=90){ x.fillRect(125, y, 6, 52); }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.anisotropy = 8;
  tex.colorSpace = THREE.SRGBColorSpace;
  // WebGPU backend (three r160) doesn't reliably generate mipmaps for canvas
  // textures, so at distance it samples an empty higher mip and the road appears
  // to vanish unless the camera is right on top of it. Disabling mipmaps and
  // sampling the base level with a linear filter renders identically on WebGL and
  // WebGPU; anisotropy still keeps it sharp at grazing angles.
  tex.generateMipmaps = false;
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  return tex;
}

// Pool of dynamic point lights. Each frame we assign the pool to the nearest
// lamp heads to the car, so lit pools of light sweep past as the car drives.
// Kept small (4) with limited range — point lights are the main per-fragment
// cost on mobile GPUs, so this is the knob to watch for framerate.
const NUM_DYN_LIGHTS = 4;
const dynLights = [];
for (let i=0;i<NUM_DYN_LIGHTS;i++){
  const pl = new THREE.PointLight(0xffb347, 0, 18, 2.0);  // intensity set per-frame
  scene.add(pl);
  dynLights.push(pl);
}
function updateDynamicLights(){
  // find nearest lamp heads to the car and park a light at each
  const scored = lampPositions
    .map((lp, idx) => ({ idx, d: lp.distanceToSquared(carPos) }))
    .sort((a,b)=>a.d-b.d)
    .slice(0, NUM_DYN_LIGHTS);
  scored.forEach((s, i) => {
    const pl = dynLights[i];
    pl.position.copy(lampPositions[s.idx]);
    // fade with distance so they pop on smoothly rather than snapping
    const dist = Math.sqrt(s.d);
    pl.intensity = THREE.MathUtils.clamp(1.4 - dist/26, 0, 1.4) * 14;
  });
}

const wheels = [];

const rimMat  = new THREE.MeshStandardMaterial({ color: 0xb8c2cf, metalness: 1.0, roughness: 0.22, envMapIntensity: 1.5 });
// Wheels are authored in the SAME local frame as the body boxes: the car's
// forward is +X and its width is +Z, so a wheel's axle must run along Z.
// A default TorusGeometry already sits in the XY plane with its hole (axle)
// along Z — which is exactly what we want. No group rotation needed.
function makeWheel(x, z){
  const w = new THREE.Group();
  const tire = new THREE.Mesh(new THREE.TorusGeometry(0.46,0.22,20,36), tireMat);
  tire.castShadow = true; w.add(tire);
  // Cylinder default axis is Y; rotate it onto Z so the hub shares the axle.
  const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.34,0.34,0.34,24), rimMat);
  hub.rotation.x = Math.PI/2; hub.castShadow = true; w.add(hub);
  // Spokes lie in the wheel face (XY plane), fanned around the axle.
  for (let i=0;i<6;i++){
    const spoke = new THREE.Mesh(new THREE.BoxGeometry(0.55,0.07,0.09), rimMat);
    spoke.rotation.z = (i/6)*Math.PI*2; spoke.castShadow = true; w.add(spoke);
  }
  w.position.set(x,0.5,z); carBody.add(w);
  // metadata for the suspension model. axleX/axleZ are the wheel's offset from
  // the car centre in the model frame (forward = +X, right = +Z). restY is the
  // wheel's neutral height; travel is applied on top as the spring compresses.
  w.userData = { restY: 0.5, axleX: x, axleZ: z, travel: 0 };
  wheels.push(w); return w;
}

let u = 0;
const SPEED = 0.045;
const carPos = new THREE.Vector3();
const aheadPos = new THREE.Vector3();
let carSpeedKmh = 0;
const prevPos = new THREE.Vector3();

// ---- suspension / body physics state ----------------------------------------
// The chassis is a damped spring-mass riding on four independent wheel springs.
// bodyY tracks vertical bob; pitch is nose up/down along the grade; roll is the
// lean into corners. Each is integrated with its own spring + damping so the
// body settles naturally instead of snapping to the terrain.
const susp = {
  bodyY: 0, bodyVY: 0,        // vertical bob offset (m) and its velocity
  pitch: 0, pitchV: 0,        // nose up(+)/down(-) radians
  roll: 0,  rollV: 0,         // lean radians
};
const WHEELBASE = 2.9;        // front-to-rear axle distance (2 * 1.45)
let prevHeading = 0;          // for measuring turn rate -> cornering roll
const LAP_LEN = track.getLength();  // cached once (used for terrain sampling)

// ---- animated shadow-casters: rotating banner gantries over the road --------
// These spin slowly and cast real-time shadows that sweep across the asphalt as
// the car passes beneath — a deliberate showcase of dynamic shadowing.
const gantryMat = new THREE.MeshStandardMaterial({ color: 0x1c2733, roughness: 0.6, metalness: 0.4 });
const bannerMat = new THREE.MeshStandardMaterial({ color: 0xd8452a, roughness: 0.5, metalness: 0.2, emissive: 0x2a0a05, emissiveIntensity: 0.5 });
const spinners = [];
const NUM_GANTRIES = 5;
for (let i=0;i<NUM_GANTRIES;i++){
  const t = (i+0.5)/NUM_GANTRIES;
  const p = track.getPointAt(t);
  const tan = track.getTangentAt(t);
  const side = new THREE.Vector3(-tan.z, 0, tan.x).normalize();

  const g = new THREE.Group();
  // two uprights + crossbeam spanning the road
  const spanW = ROAD_W + SHOULDER_W*2 + 2;
  [-1,1].forEach(sgn => {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.3, 6.5, 0.3), gantryMat);
    leg.position.set(sgn*spanW/2, 3.25, 0); leg.castShadow = true; g.add(leg);
  });
  const beam = new THREE.Mesh(new THREE.BoxGeometry(spanW, 0.5, 0.5), gantryMat);
  beam.position.y = 6.4; beam.castShadow = true; g.add(beam);

  // a spinning banner blade hung from the beam — this is the moving shadow
  const blade = new THREE.Mesh(new THREE.BoxGeometry(3.4, 1.4, 0.12), bannerMat);
  blade.position.y = 5.4; blade.castShadow = true; g.add(blade);
  spinners.push(blade);

  // orient the gantry across the road and place it
  const angle = Math.atan2(tan.x, tan.z);
  g.rotation.y = angle;
  g.position.set(p.x, roadHeight(t), p.z);
  scene.add(g);
}

function placeCar(dt){
  u = (u + SPEED * dt) % 1;
  track.getPointAt(u, carPos);
  track.getPointAt((u + 0.008) % 1, aheadPos);

  // --- terrain sampling at the two axle positions along the track ---
  // Convert the wheelbase (a distance in metres) into a track-parameter delta so
  // we can sample the road height just ahead of and behind the car centre.
  const du = (WHEELBASE/2) / LAP_LEN;
  const hFront = roadHeight((u + du) % 1);
  const hRear  = roadHeight((u - du + 1) % 1);
  const hCentre = roadHeight(u);

  // Position the car on the track, lifted onto the terrain.
  car.position.copy(carPos);
  car.position.y = hCentre;

  // --- heading: face along travel, kept level ---
  // The outer car group handles only yaw (which way it points). All up/down
  // tilt is done by the pitch spring on the body below, so grade response feels
  // like real suspension rather than the whole rig rigidly following the road.
  const look = aheadPos.clone();
  look.y = hCentre;      // level with the car origin -> pure heading, no pitch
  car.lookAt(look);

  // --- vertical body spring (bob) ---
  // Target height is the mean of the axle contact points; the body chases it via
  // a critically-ish damped spring so bumps push it up and it settles back.
  const targetY = (hFront + hRear)/2 - hCentre;   // relative to car origin
  const kY = 90, cY = 14;                          // stiffness, damping
  const aY = kY*(targetY - susp.bodyY) - cY*susp.bodyVY;
  susp.bodyVY += aY*dt; susp.bodyY += susp.bodyVY*dt;

  // --- pitch spring (nose along the grade) ---
  // Grade angle from front/rear height difference; body pitch springs toward it.
  const gradePitch = Math.atan2(hFront - hRear, WHEELBASE);
  const kP = 60, cP = 11;
  const aP = kP*(gradePitch - susp.pitch) - cP*susp.pitchV;
  susp.pitchV += aP*dt; susp.pitch += susp.pitchV*dt;

  // --- roll spring (lean into corners) ---
  // Turn rate this frame -> lateral acceleration -> body leans outward.
  const heading = Math.atan2(aheadPos.x - carPos.x, aheadPos.z - carPos.z);
  let dHead = heading - prevHeading;
  if (dHead >  Math.PI) dHead -= Math.PI*2;
  if (dHead < -Math.PI) dHead += Math.PI*2;
  prevHeading = heading;
  const turnRate = dHead / Math.max(dt, 0.001);
  const targetRoll = THREE.MathUtils.clamp(-turnRate * 0.5, -0.14, 0.14);
  const kR = 55, cR = 10;
  const aR = kR*(targetRoll - susp.roll) - cR*susp.rollV;
  susp.rollV += aR*dt; susp.roll += susp.rollV*dt;

  // Apply body bob + pitch + roll on top of the car's heading orientation.
  // carBody carries the -PI/2 model-align (Y). We add pitch about the model's
  // lateral axis (local Z) and roll about its forward axis (local X). Using an
  // explicit 'YZX' Euler order applies Y first, then Z, then X, each about the
  // intermediate axes — which keeps pitch and roll from cross-contaminating.
  carBody.position.y = susp.bodyY;
  carBody.rotation.set(susp.roll, -Math.PI/2, susp.pitch, 'YZX');

  // --- per-wheel spring travel (visible movement in the wheel wells) ---
  // Each wheel samples the ground under its own along-track position (front
  // wheels lead, rear wheels trail) and springs toward it, so wheels ride the
  // surface individually and the axle line articulates over bumps.
  wheels.forEach(w => {
    const ud = w.userData;
    const wheelU = (u + (ud.axleX / LAP_LEN) + 1) % 1;   // forward offset along track
    const groundRel = roadHeight(wheelU) - hCentre;      // ground vs car origin
    const target = ud.restY + groundRel - susp.bodyY;    // account for body bob
    w.position.y += (target - w.position.y) * Math.min(1, dt * 12);
  });

  const dist = carPos.distanceTo(prevPos);
  // Spin about the wheel's own axle (local Z, which the base y-rotation aimed
  // sideways). rotateOnAxis composes correctly on top of that base orientation.
  wheels.forEach(w => w.rotateOnAxis(WHEEL_AXLE, -dist * 1.4));
  carSpeedKmh = (dist / dt) * 3.6 * 2.2;
  prevPos.copy(carPos);
}

// glossy polished markers along the track (high-spec metal, env reflections
// from the static environment map — cheap, no live cube rendering)
const chromePylonMat = new THREE.MeshStandardMaterial({ color: 0xdfe6ee, metalness: 1.0, roughness: 0.12, envMapIntensity: 1.6 });
for (let i=0;i<18;i++){
  const t = (i+0.3)/18;
  const p = track.getPointAt(t);
  const tan = track.getTangentAt(t);
  const side = new THREE.Vector3(-tan.z, 0, tan.x).normalize();
  const sign = i % 2 === 0 ? 1 : -1;
  const pos = p.clone().addScaledVector(side, sign * (ROAD_W/2 + 0.9));
  const marker = new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.16,1.1,10), chromePylonMat);
  marker.position.set(pos.x, 0.55 + roadHeight(t), pos.z); marker.castShadow = true; scene.add(marker);
}

// =================== CINEMATIC CAMERA ===================
const tmpTan = new THREE.Vector3();
function carForward(){ track.getTangentAt(u, tmpTan); return tmpTan.clone().normalize(); }

// Approximate terrain height beneath any world position. The road height is
// defined along the track parameter u, so we find the u nearest to the query
// point and read roadHeight there. A coarse scan is plenty for keeping cameras
// above the surface. Cached samples make it cheap.
const _trackSamples = [];
for (let i=0;i<200;i++){ const uu=i/200; const pp=track.getPointAt(uu); _trackSamples.push({u:uu, x:pp.x, z:pp.z}); }
function terrainHeightAt(x, z){
  let best=0, bestD=Infinity;
  for (let i=0;i<_trackSamples.length;i++){
    const s=_trackSamples[i]; const dx=s.x-x, dz=s.z-z; const d=dx*dx+dz*dz;
    if (d<bestD){ bestD=d; best=s.u; }
  }
  return roadHeight(best);
}
// Keep a camera position a minimum clearance above the local surface so shots
// never dip below the road, especially in terrain dips and low angles.
function clampAboveGround(pos, clearance){
  const minY = terrainHeightAt(pos.x, pos.z) + clearance;
  if (pos.y < minY) pos.y = minY;
  return pos;
}

// Deterministic pseudo-random for fixed-camera anchors: seeded only by the shot
// index so a given shot always frames the same way. This makes benchmark runs
// reproducible (no Math.random in the camera path).
function seededUnit(seed){
  const x = Math.sin(seed * 12.9898) * 43758.5453;
  return x - Math.floor(x);   // 0..1, stable for a given seed
}

const shots = [
  { name: 'CHASE', dur: 6, fn: () => {
      const f = carForward();
      const pos = carPos.clone().addScaledVector(f, -11).add(new THREE.Vector3(0,4.4,0));
      return { pos: clampAboveGround(pos, 1.2), target: carPos.clone().add(new THREE.Vector3(0,1.2,0)) };
  }},
  { name: 'LOW TRACK', dur: 5, fn: () => {
      const f = carForward();
      const side = new THREE.Vector3(-f.z,0,f.x);
      const pos = carPos.clone().addScaledVector(side, 6).add(new THREE.Vector3(0,0.9,0)).addScaledVector(f,-1);
      // low angle, but keep it just clear of the surface it sits beside
      return { pos: clampAboveGround(pos, 0.5), target: carPos.clone().add(new THREE.Vector3(0,0.8,0)) };
  }},
  { name: 'FLYBY', dur: 5, fixed: true, fn: (shot) => ({ pos: shot._anchor, target: carPos.clone().add(new THREE.Vector3(0,1,0)) }) },
  { name: 'HELI', dur: 6, fn: (shot, tt) => {
      const ang = tt * 0.5;
      const pos = carPos.clone().add(new THREE.Vector3(Math.cos(ang)*16, 12, Math.sin(ang)*16));
      return { pos: clampAboveGround(pos, 2), target: carPos.clone() };
  }},
  { name: 'FIXED PYLON', dur: 5, fixed: true, fn: (shot) => ({ pos: shot._anchor, target: carPos.clone().add(new THREE.Vector3(0,1,0)) }) },
];

let shotIndex = 0, shotT = 0, autoCut = true;
const camPos = new THREE.Vector3().copy(camera.position);
const camTgt = new THREE.Vector3();
const camnameEl = document.getElementById('camname');

function anchorFor(seed){
  // Deterministic placement seeded by the shot index, so the same fixed shot
  // always frames identically — essential for reproducible benchmark runs.
  const ahead = (u + 0.10) % 1;
  const p = track.getPointAt(ahead);
  const tan = track.getTangentAt(ahead);
  const side = new THREE.Vector3(-tan.z,0,tan.x).normalize();
  const sign = seededUnit(seed) > 0.5 ? 1 : -1;
  const dist = 8 + seededUnit(seed*1.7) * 5;
  const height = 2 + seededUnit(seed*2.3) * 4;
  const anchor = p.add(side.multiplyScalar(sign * dist)).add(new THREE.Vector3(0, height, 0));
  return clampAboveGround(anchor, 1.5);
}

function startShot(i){
  shotIndex = i; shotT = 0;
  const shot = shots[i];
  // seed fixed-camera anchors by the shot index so they're reproducible
  if (shot.fixed) shot._anchor = anchorFor(i + 1);
  camnameEl.textContent = shot.name;
  const r = shot.fn(shot, 0);
  if (shot.fixed) camPos.copy(r.pos);
}

startShot(0);

function nextShot(){ startShot((shotIndex+1) % shots.length); }
function toggleAutoCut(){
  autoCut = !autoCut;
  const b = document.getElementById('btn-auto');
  b.classList.toggle('off', !autoCut);
  b.querySelector('.lbl').textContent = autoCut ? 'Auto-cut: on' : 'Auto-cut: off';
}

window.addEventListener('keydown', e => {
  if (e.code === 'Space'){ nextShot(); e.preventDefault(); }
  if (e.key.toLowerCase() === 'p'){ toggleAutoCut(); }
  if (e.key.toLowerCase() === 'u'){ toggleUncap(); }
});

// Touch / click buttons (mobile has no physical keys). Bind to pointerdown so
// they respond instantly without the 300ms tap delay, and stop the event from
// bubbling to any camera/orbit handlers.
function bindPress(id, fn){
  const el = document.getElementById(id);
  el.addEventListener('pointerdown', e => { e.preventDefault(); e.stopPropagation(); fn(); });
}
bindPress('btn-next', nextShot);
bindPress('btn-auto', toggleAutoCut);

// ---- FPS uncap toggle ----
function toggleUncap(){
  if (bench.running) return;   // don't change render load mid-run
  uncap = !uncap;
  const b = document.getElementById('btn-uncap');
  b.classList.toggle('off', !uncap);
  b.querySelector('.lbl').textContent = uncap ? 'Uncap FPS: on' : 'Uncap FPS: off';
  // reset frame pacing so the first sample after a switch isn't a huge spike

}
bindPress('btn-uncap', toggleUncap);

// ---- Graphics-API toggle ----
// Swapping the backend means tearing down one GPU context and standing up
// another; doing that live is fiddly and error-prone, so we persist the choice
// in the URL and reload for a clean rebuild. The button always names the backend
// you'd switch *to*. If WebGPU isn't available it's shown disabled with a reason.
(function initApiToggle(){
  const btn = document.getElementById('btn-api');
  const lbl = btn.querySelector('.lbl');
  if (!webgpuSupported){
    // Only WebGL is possible on this system — make that explicit and inert.
    btn.classList.add('disabled');
    lbl.textContent = 'WebGPU N/A';
    btn.title = 'WebGPU is not supported in this browser/device';
    return;
  }
  const target = (backend === 'webgpu') ? 'webgl' : 'webgpu';
  lbl.textContent = (target === 'webgpu') ? 'Use WebGPU' : 'Use WebGL';
  btn.title = 'Currently running ' + backendLabel + ' — click to switch to ' +
              (target === 'webgpu' ? 'WebGPU' : 'WebGL') + ' (reloads)';
  bindPress('btn-api', () => {
    if (bench.running) return;            // don't swap mid-benchmark
    const p = new URLSearchParams(location.search);
    p.set('api', target);
    location.search = p.toString();       // triggers reload with new backend
  });
})();

// =================== BENCHMARK ===================
// Runs a fixed-duration timed pass, samples per-frame metrics, then downloads a
// plain-text report (CSGO-console style: run summary + percentile breakdown).
const BENCH_DURATION = 30;   // seconds
const bench = {
  running: false,
  startTs: 0,
  elapsed: 0,
  frames: [],          // { t, dt(ms), fps, draws, tris }
  startedAtISO: '',
  wakeLock: null,      // Screen Wake Lock sentinel, held during a run
  memPeakMB: 0,        // peak used JS heap seen during the run (MB), 0 if unsupported
  memLimitMB: 0,       // engine heap ceiling (MB), 0 if unsupported
  memSupported: false, // whether performance.memory was available
  uncapped: false,     // whether FPS uncap (multi-render) mode was active
};
const benchBtn   = document.getElementById('btn-bench');
const benchBanner= document.getElementById('bench-banner');
const benchCount = document.getElementById('bench-count');
const benchFill  = document.getElementById('bench-fill');

function resetSimulation(){
  // Return the world to a clean, repeatable starting state so every benchmark
  // measures the same workload from the same point.
  u = 0;
  track.getPointAt(0, prevPos);
  wheels.forEach(w => w.rotation.set(0,0,0));
  autoCut = true;
  document.getElementById('btn-auto').classList.remove('off');
  document.getElementById('btn-auto').querySelector('.lbl').textContent = 'Auto-cut: on';
  startShot(0);
  camPos.set(0,8,20); camTgt.copy(carPos);
  // reset the on-screen fps meters too
  for (let i=0;i<history.length;i++) history[i]=60;
}

// Keep the screen awake for the duration of a run so a dimming/lock timeout
// can't skew frame timings (or interrupt the pass). The Screen Wake Lock API is
// only granted to visible pages, so we also re-acquire it if the tab is hidden
// and later shown again mid-benchmark. Absent support degrades silently.
async function acquireWakeLock(){
  if (!('wakeLock' in navigator)) return;
  try {
    bench.wakeLock = await navigator.wakeLock.request('screen');
    bench.wakeLock.addEventListener('release', () => { bench.wakeLock = null; });
  } catch(e){ bench.wakeLock = null; }
}
function releaseWakeLock(){
  if (bench.wakeLock){ try { bench.wakeLock.release(); } catch(e){} bench.wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  if (bench.running && !bench.wakeLock && document.visibilityState === 'visible') acquireWakeLock();
});

function startBenchmark(){
  resetSimulation();
  bench.running = true;
  bench.elapsed = 0;
  bench.frames = [];
  bench.memPeakMB = 0; bench.memLimitMB = 0; bench.memSupported = false;
  bench.uncapped = uncap;
  bench.startTs = performance.now();
  bench.startedAtISO = new Date().toISOString();
  // Reset the frame-time baseline so the first sampled dt isn't inflated by the
  // gap since the previous frame (e.g. button-press latency).
  prevTs = performance.now();
  lastFrame = performance.now();
  benchBtn.classList.add('running');
  benchBtn.querySelector('.lbl').textContent = 'Stop';
  benchBanner.classList.add('show');
  acquireWakeLock();
}

function stopBenchmark(aborted){
  bench.running = false;
  releaseWakeLock();
  benchBtn.classList.remove('running');
  benchBtn.querySelector('.lbl').textContent = 'Benchmark';
  benchBanner.classList.remove('show');
  if (!aborted && bench.frames.length > 5){
    showResults();
  }
}

function toggleBenchmark(){ bench.running ? stopBenchmark(true) : startBenchmark(); }
bindPress('btn-bench', toggleBenchmark);

// called once per rendered frame from the loop while running
function benchSample(nowTs, dtMs){
  bench.elapsed = (nowTs - bench.startTs) / 1000;
  const mem = memoryInfo();
  if (mem){
    bench.memSupported = true;
    bench.memLimitMB = mem.limitMB;
    if (mem.usedMB > bench.memPeakMB) bench.memPeakMB = mem.usedMB;
  }
  bench.frames.push({
    t: +bench.elapsed.toFixed(3),
    dt: +dtMs.toFixed(3),
    fps: dtMs > 0 ? +(1000/dtMs).toFixed(2) : 0,
    draws: drawCalls(),
    tris: triangleCount(),
    mem: mem ? +mem.usedMB.toFixed(1) : null,
  });
  benchCount.textContent = bench.elapsed.toFixed(1) + 's';
  benchFill.style.width = Math.min(100, (bench.elapsed/BENCH_DURATION)*100) + '%';
  if (bench.elapsed >= BENCH_DURATION) stopBenchmark(false);
}

function pct(sortedAsc, p){
  if (!sortedAsc.length) return 0;
  const idx = Math.min(sortedAsc.length-1, Math.max(0, Math.round((p/100)*(sortedAsc.length-1))));
  return sortedAsc[idx];
}
function mean(a){ return a.reduce((s,v)=>s+v,0)/a.length; }
function stdev(a, m){ return Math.sqrt(a.reduce((s,v)=>s+(v-m)*(v-m),0)/a.length); }
function pad(s, n){ s=String(s); return s + ' '.repeat(Math.max(0, n-s.length)); }

// Shared metric computation so the text report and the image card always agree.
function computeStats(){
  const f = bench.frames;
  const fpsArr = f.map(x=>x.fps);
  const ftArr  = f.map(x=>x.dt);
  const fpsSorted = [...fpsArr].sort((a,b)=>a-b);
  const ftSorted  = [...ftArr].sort((a,b)=>a-b);
  const avgFps = mean(fpsArr);
  const avgFt  = mean(ftArr);
  // "1% low" / "0.1% low" the way frametime tools report: mean of the worst frames
  const worst = [...ftArr].sort((a,b)=>b-a); // slowest first
  const lowN = (p)=>{ const n=Math.max(1, Math.floor(f.length*p)); const slice=worst.slice(0,n); return 1000/mean(slice); };
  const low1 = lowN(0.01), low01 = lowN(0.001);
  // Composite benchmark score. Weighs sustained framerate (average) together with
  // smoothness (the 1% low), so a run that holds a steady 60 scores higher than
  // one that averages 60 by swinging between 120 and stutters. Scaled ×10 for a
  // punchier headline number. This same value drives the rank tiers.
  const score = Math.round((avgFps * 0.7 + low1 * 0.3) * 10);
  return {
    f, fpsArr, ftArr, fpsSorted, ftSorted, avgFps, avgFt,
    minFps: Math.min(...fpsArr), maxFps: Math.max(...fpsArr),
    stdevFps: stdev(fpsArr, avgFps),
    low1, low01,
    score,
    gpu: gpuName,
    memSupported: bench.memSupported,
    memPeakMB: bench.memPeakMB,
    memLimitMB: bench.memLimitMB,
  };
}

function buildReport(){
  const s = computeStats();
  const { f, fpsArr, ftArr, fpsSorted, ftSorted, avgFps, avgFt, low1, low01, gpu } = s;

  const L = [];
  L.push('================================================================');
  L.push('  CHASSIS - CINEMATIC TRACK  |  BENCHMARK REPORT');
  L.push('================================================================');
  L.push('');
  L.push('Run started      : ' + bench.startedAtISO);
  L.push('Duration         : ' + bench.elapsed.toFixed(2) + ' s');
  L.push('Frames rendered  : ' + f.length);
  L.push('');
  L.push('---- SYSTEM ----------------------------------------------------');
  L.push('Graphics API     : ' + backendLabel);
  L.push('Render mode      : ' + (bench.uncapped ? 'UNCAPPED (' + UNCAP_RENDERS + ' renders/frame — throughput test)' : 'Normal (vsync-locked to display)'));
  L.push('GPU              : ' + gpu);
  L.push('Render viewport  : ' + RENDER_W + ' x ' + RENDER_H + ' (fixed)');
  L.push('Device pixel rat.: ' + window.devicePixelRatio);
  L.push('Screen           : ' + screen.width + ' x ' + screen.height);
  L.push('Window           : ' + window.innerWidth + ' x ' + window.innerHeight);
  L.push('User agent       : ' + navigator.userAgent);
  L.push('Logical cores    : ' + (navigator.hardwareConcurrency || 'n/a'));
  if (navigator.deviceMemory) L.push('Device memory    : ~' + navigator.deviceMemory + ' GB');
  L.push('Draw calls/frame : ' + (f.length? f[f.length-1].draws : 'n/a'));
  L.push('Triangles/frame  : ' + (f.length? f[f.length-1].tris.toLocaleString() : 'n/a'));
  L.push('');
  L.push('---- MEMORY (JS heap) ------------------------------------------');
  if (bench.memSupported){
    L.push('Peak in use      : ' + fmtMB(bench.memPeakMB));
    L.push('Heap limit       : ' + fmtMB(bench.memLimitMB));
    L.push('Utilisation      : ' + (bench.memLimitMB? (bench.memPeakMB/bench.memLimitMB*100).toFixed(1) : '0') + ' %');
  } else {
    L.push('Peak in use      : n/a (performance.memory unavailable in this browser)');
  }
  if (navigator.deviceMemory) L.push('Device RAM (est) : ~' + navigator.deviceMemory + ' GB');
  L.push('');
  L.push('---- FRAMERATE (fps) -------------------------------------------');
  L.push('Average          : ' + avgFps.toFixed(2));
  L.push('Minimum          : ' + s.minFps.toFixed(2));
  L.push('Maximum          : ' + s.maxFps.toFixed(2));
  L.push('Std deviation    : ' + s.stdevFps.toFixed(2));
  L.push('1% low           : ' + low1.toFixed(2));
  L.push('0.1% low         : ' + low01.toFixed(2));
  L.push('');
  L.push('---- FRAME TIME (ms) -------------------------------------------');
  L.push('Average          : ' + avgFt.toFixed(3));
  L.push('Minimum          : ' + Math.min(...ftArr).toFixed(3));
  L.push('Maximum          : ' + Math.max(...ftArr).toFixed(3));
  L.push('50th pct (median): ' + pct(ftSorted,50).toFixed(3));
  L.push('95th pct         : ' + pct(ftSorted,95).toFixed(3));
  L.push('99th pct         : ' + pct(ftSorted,99).toFixed(3));
  L.push('');
  L.push('---- FPS PERCENTILES -------------------------------------------');
  [1,5,10,25,50,75,90,95,99].forEach(p=>{
    L.push(pad('  p'+p, 8) + ': ' + pct(fpsSorted,p).toFixed(2) + ' fps');
  });
  L.push('');
  L.push('================================================================');
  L.push('  End of report - ' + f.length + ' frames over ' + bench.elapsed.toFixed(2) + 's');
  L.push('================================================================');
  return L.join('\n');
}

function downloadReport(){
  const text = buildReport();
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = bench.startedAtISO.replace(/[:.]/g,'-').replace('T','_').slice(0,19);
  a.href = url; a.download = 'chassis-benchmark_' + stamp + '.txt';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}

// =================== BENCHMARK CARD (image) ===================
// Renders a small collectible-style "stat card" (trading-card proportions) with
// the run's headline numbers, system info, and a frametime graph, then downloads
// it as a PNG alongside the text report.

// Give each run a flavor tier + accent based on the composite score — cosmetic.
// Thresholds are on the ×10 score, so ~1100 ≈ a rock-solid 110fps run, etc.
function rankFor(score){
  if (score >= 1100) return { tier: 'S',  name: 'MYTHIC',    accent: '#ff8adf' };
  if (score >= 850)  return { tier: 'A',  name: 'LEGENDARY', accent: '#ffb14d' };
  if (score >= 600)  return { tier: 'B',  name: 'RARE',      accent: '#5cffb1' };
  if (score >= 400)  return { tier: 'C',  name: 'UNCOMMON',  accent: '#4dd0ff' };
  return               { tier: 'D',  name: 'COMMON',    accent: '#7a90a8' };
}

// Trim a device string down to something a card can show without overflow.
function shortGPU(g){
  if (!g) return 'Unknown';
  // Pull the most recognisable chunk out of verbose ANGLE/WebGL renderer strings.
  let s = g.replace(/ANGLE\s*\(/i,'').replace(/\)$/,'');
  const m = s.match(/(NVIDIA|GeForce|Radeon|AMD|Intel|Apple|Adreno|Mali|PowerVR)[^,;()]*/i);
  if (m) s = m[0];
  s = s.replace(/\s+/g,' ').trim();
  return s.length > 34 ? s.slice(0,33) + '…' : s;
}

function roundRectPath(x, c, y, w, h, r){
  x.beginPath();
  x.moveTo(c+r, y); x.arcTo(c+w, y, c+w, y+h, r); x.arcTo(c+w, y+h, c, y+h, r);
  x.arcTo(c, y+h, c, y, r); x.arcTo(c, y, c+w, y, r); x.closePath();
}

function drawCard(){
  const S = 2;                              // supersample for crisp text on export
  const W = 480, H = 680;
  const cv = document.createElement('canvas');
  cv.width = W*S; cv.height = H*S;
  const x = cv.getContext('2d');
  x.scale(S, S);

  const s = computeStats();
  const rank = rankFor(s.score);
  const pad = 22;

  // ---- background: deep panel with a subtle vertical glow ----
  const bg = x.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, '#0d1622'); bg.addColorStop(0.5, '#0a0e14'); bg.addColorStop(1, '#070a10');
  x.fillStyle = bg; x.fillRect(0,0,W,H);

  // ---- outer frame (accent-tinted, like a foil border) ----
  roundRectPath(x, 8, 8, W-16, H-16, 16);
  const frame = x.createLinearGradient(0,0,W,H);
  frame.addColorStop(0, rank.accent); frame.addColorStop(0.5, '#2a3a4a'); frame.addColorStop(1, rank.accent);
  x.lineWidth = 3; x.strokeStyle = frame; x.stroke();
  roundRectPath(x, 14, 14, W-28, H-28, 12);
  x.lineWidth = 1; x.strokeStyle = 'rgba(120,200,255,0.18)'; x.stroke();

  const FM = 'ui-monospace, "SF Mono", Menlo, monospace';
  const left = pad + 4, right = W - pad - 4, innerW = right - left;

  // ---- header band ----
  let cy = 40;
  x.textBaseline = 'alphabetic';
  x.fillStyle = '#4dd0ff'; x.font = `700 11px ${FM}`;
  x.save(); x.letterSpacing = '4px';
  x.fillText('CHASSIS', left, cy);
  x.restore();
  // rank pill, top-right
  const pillW = 104, pillH = 26, pillX = right - pillW, pillY = cy - 18;
  roundRectPath(x, pillX, pillY, pillW, pillH, 13);
  x.fillStyle = 'rgba(0,0,0,0.35)'; x.fill();
  x.lineWidth = 1.5; x.strokeStyle = rank.accent; x.stroke();
  x.fillStyle = rank.accent; x.font = `700 11px ${FM}`; x.textAlign = 'center';
  x.fillText(rank.tier + ' · ' + rank.name, pillX + pillW/2, pillY + 17);
  x.textAlign = 'left';
  cy += 10;
  x.fillStyle = '#7a90a8'; x.font = `9px ${FM}`;
  x.save(); x.letterSpacing = '2px';
  x.fillText('CINEMATIC TRACK · BENCHMARK CERTIFICATE', left, cy);
  x.restore();

  // divider
  cy += 12;
  x.strokeStyle = 'rgba(120,200,255,0.15)'; x.lineWidth = 1;
  x.beginPath(); x.moveTo(left, cy); x.lineTo(right, cy); x.stroke();

  // ---- hero: big average FPS (score moved below the spec block) ----
  cy += 46;
  x.fillStyle = '#eaf3ff'; x.font = `700 72px ${FM}`;
  x.fillText(s.avgFps.toFixed(1), left, cy);
  const wNum = x.measureText(s.avgFps.toFixed(1)).width;
  x.fillStyle = rank.accent; x.font = `700 18px ${FM}`;
  x.fillText('FPS', left + wNum + 12, cy);
  x.fillStyle = '#7a90a8'; x.font = `9px ${FM}`;
  x.save(); x.letterSpacing = '2px';
  x.fillText('AVERAGE FRAMERATE', left + wNum + 12, cy - 22);
  x.restore();

  // ---- four sub-stats (1% low / 0.1% low / avg frametime / peak RAM) ----
  cy += 20;
  // Peak heap shown compactly: whole MB, or GB with one decimal when large.
  const ramVal = s.memSupported
    ? (s.memPeakMB >= 1024 ? (s.memPeakMB/1024).toFixed(1) : s.memPeakMB.toFixed(0))
    : 'n/a';
  const ramUnit = s.memSupported ? (s.memPeakMB >= 1024 ? 'GB' : 'MB') : '';
  const colW = innerW / 4;
  const subs = [
    ['1% LOW',    s.low1.toFixed(1),  'fps'],
    ['0.1% LOW',  s.low01.toFixed(1), 'fps'],
    ['FRAME',     s.avgFt.toFixed(2), 'ms'],
    ['PEAK RAM',  ramVal,             ramUnit],
  ];
  subs.forEach((c,i)=>{
    const cx0 = left + colW*i;
    x.fillStyle = '#7a90a8'; x.font = `8px ${FM}`;
    x.save(); x.letterSpacing = '1px'; x.fillText(c[0], cx0, cy); x.restore();
    x.fillStyle = '#eaf3ff'; x.font = `700 20px ${FM}`;
    x.fillText(c[1], cx0, cy + 24);
    const wv = x.measureText(c[1]).width;
    x.fillStyle = '#7a90a8'; x.font = `9px ${FM}`;
    x.fillText(c[2], cx0 + wv + 4, cy + 24);
  });

  // ---- frametime graph ----
  cy += 40;
  x.fillStyle = '#7a90a8'; x.font = `8px ${FM}`;
  x.save(); x.letterSpacing = '1.5px'; x.fillText('FRAME TIME · WHOLE RUN', left, cy); x.restore();
  cy += 8;
  const gX = left, gY = cy, gW = innerW, gH = 96;
  roundRectPath(x, gX, gY, gW, gH, 6);
  x.fillStyle = 'rgba(77,208,255,0.04)'; x.fill();
  x.strokeStyle = 'rgba(120,200,255,0.12)'; x.lineWidth = 1; x.stroke();

  const ft = s.ftArr;
  // Cap the vertical scale so a couple of spikes don't flatten the whole trace.
  const p99 = s.ftSorted[Math.min(s.ftSorted.length-1, Math.round(0.99*(s.ftSorted.length-1)))];
  const gMax = Math.max(p99 * 1.15, s.avgFt * 1.6, 8);

  x.save();
  roundRectPath(x, gX, gY, gW, gH, 6); x.clip();
  // 60fps (16.67ms) reference line if it's on-scale
  const refMs = 1000/60;
  if (refMs < gMax){
    const ry = gY + gH - (refMs/gMax)*gH;
    x.strokeStyle = 'rgba(92,255,177,0.35)'; x.setLineDash([4,4]); x.lineWidth = 1;
    x.beginPath(); x.moveTo(gX, ry); x.lineTo(gX+gW, ry); x.stroke(); x.setLineDash([]);
    x.fillStyle = 'rgba(92,255,177,0.6)'; x.font = `8px ${FM}`;
    x.fillText('60', gX+4, ry-3);
  }
  // the trace (filled area under the line)
  x.beginPath();
  ft.forEach((v,i)=>{
    const px = gX + (i/(ft.length-1))*gW;
    const py = gY + gH - Math.min(1, v/gMax)*gH;
    i ? x.lineTo(px,py) : x.moveTo(px,py);
  });
  x.lineTo(gX+gW, gY+gH); x.lineTo(gX, gY+gH); x.closePath();
  const gg = x.createLinearGradient(0,gY,0,gY+gH);
  gg.addColorStop(0, 'rgba(77,208,255,0.30)'); gg.addColorStop(1, 'rgba(77,208,255,0)');
  x.fillStyle = gg; x.fill();
  x.beginPath();
  ft.forEach((v,i)=>{
    const px = gX + (i/(ft.length-1))*gW;
    const py = gY + gH - Math.min(1, v/gMax)*gH;
    i ? x.lineTo(px,py) : x.moveTo(px,py);
  });
  x.strokeStyle = '#4dd0ff'; x.lineWidth = 1.4; x.stroke();
  x.restore();
  cy = gY + gH;

  // ---- system spec block ----
  cy += 26;
  const rows = [
    ['GRAPHICS API', backendLabel.replace(' (via three.js)','') + (bench.uncapped ? '  ·  UNCAPPED' : '')],
    ['GPU',          shortGPU(s.gpu)],
    ['RESOLUTION',   RENDER_W + '×' + RENDER_H],
    ['CPU THREADS',  String(navigator.hardwareConcurrency || 'n/a') +
                     (navigator.deviceMemory ? '   ·   ~' + navigator.deviceMemory + ' GB RAM' : '')],
    ['MIN / MAX',    s.minFps.toFixed(0) + ' – ' + s.maxFps.toFixed(0) + ' fps   ·   σ ' + s.stdevFps.toFixed(1)],
    ['JS HEAP',      s.memSupported
                       ? fmtMB(s.memPeakMB) + ' / ' + fmtMB(s.memLimitMB) + ' peak'
                       : 'n/a (browser)'],
    ['SAMPLE',       s.f.length + ' frames · ' + bench.elapsed.toFixed(0) + 's'],
  ];
  x.font = `10px ${FM}`;
  rows.forEach(r=>{
    x.fillStyle = '#7a90a8';
    x.save(); x.letterSpacing = '1px'; x.fillText(r[0], left, cy); x.restore();
    x.fillStyle = '#eaf3ff'; x.textAlign = 'right';
    x.fillText(r[1], right, cy);
    x.textAlign = 'left';
    x.strokeStyle = 'rgba(120,200,255,0.06)'; x.lineWidth = 1;
    x.beginPath(); x.moveTo(left, cy+6); x.lineTo(right, cy+6); x.stroke();
    cy += 22;
  });

  // ---- headline SCORE block (fills the space between spec rows and footer) ----
  // Centred panel with the composite score as the hero collectible number, the
  // rank tier beneath it, all in the rank accent colour.
  cy += 20;
  const panelH = 118, panelY = cy;
  roundRectPath(x, left, panelY, innerW, panelH, 8);
  const scoreBg = x.createLinearGradient(0, panelY, 0, panelY + panelH);
  scoreBg.addColorStop(0, 'rgba(77,208,255,0.06)');
  scoreBg.addColorStop(1, 'rgba(77,208,255,0.02)');
  x.fillStyle = scoreBg; x.fill();
  x.lineWidth = 1; x.strokeStyle = rank.accent + '55'; x.stroke();

  const cX = left + innerW/2;   // panel centre x
  x.textAlign = 'center';
  // label
  x.fillStyle = '#7a90a8'; x.font = `9px ${FM}`;
  x.save(); x.letterSpacing = '4px'; x.fillText('BENCHMARK SCORE', cX, panelY + 26); x.restore();
  // big score number
  x.fillStyle = rank.accent; x.font = `700 60px ${FM}`;
  x.fillText(String(s.score), cX, panelY + 82);
  // rank tier under the number
  x.fillStyle = '#eaf3ff'; x.font = `700 10px ${FM}`;
  x.save(); x.letterSpacing = '3px'; x.fillText(rank.tier + ' · ' + rank.name, cX, panelY + 104); x.restore();
  x.textAlign = 'left';
  cy = panelY + panelH;

  // ---- footer ----
  const date = new Date(bench.startedAtISO);
  const dstr = isNaN(date) ? bench.startedAtISO.slice(0,10)
             : date.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});
  x.fillStyle = '#5a6b7d'; x.font = `8px ${FM}`;
  x.save(); x.letterSpacing = '1.5px';
  x.fillText('ISSUED ' + dstr.toUpperCase(), left, H - 26);
  x.restore();
  x.textAlign = 'right';
  x.fillStyle = rank.accent;
  x.save(); x.letterSpacing = '1.5px';
  x.fillText('◈ CERTIFIED RUN', right, H - 26);
  x.restore();
  x.textAlign = 'left';

  return cv;
}

// The card canvas for the most recent finished run, built once and reused for
// both the on-screen preview and the PNG download.
let lastCardCanvas = null;

function triggerDownload(blobOrUrl, filename){
  const url = (typeof blobOrUrl === 'string') ? blobOrUrl : URL.createObjectURL(blobOrUrl);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  if (typeof blobOrUrl !== 'string') setTimeout(()=>URL.revokeObjectURL(url), 4000);
}
function stamp(){ return bench.startedAtISO.replace(/[:.]/g,'-').replace('T','_').slice(0,19); }

function downloadCard(){
  const cv = lastCardCanvas;
  if (!cv) return;
  cv.toBlob(blob => { if (blob) triggerDownload(blob, 'chassis-card_' + stamp() + '.png'); }, 'image/png');
}

// ---- results popup ----
const resultsOverlay = document.getElementById('results-overlay');
const resultsImg     = document.getElementById('results-img');

function showResults(){
  // Render the card once and keep the canvas around for the PNG export.
  try { lastCardCanvas = drawCard(); }
  catch(e){ console.warn('card render failed', e); lastCardCanvas = null; }
  if (lastCardCanvas){
    try { resultsImg.src = lastCardCanvas.toDataURL('image/png'); } catch(e){}
    resultsImg.style.display = '';
  } else {
    resultsImg.style.display = 'none';   // no preview, but text report still offered
  }
  resultsOverlay.classList.add('show');
}
function hideResults(){ resultsOverlay.classList.remove('show'); }

document.getElementById('dl-image').addEventListener('click', () => { downloadCard(); });
document.getElementById('dl-text').addEventListener('click', () => { downloadReport(); });
document.getElementById('dl-both').addEventListener('click', () => { downloadReport(); downloadCard(); });
document.getElementById('results-close').addEventListener('click', hideResults);
resultsOverlay.addEventListener('click', e => { if (e.target === resultsOverlay) hideResults(); });
window.addEventListener('keydown', e => { if (e.key === 'Escape' && resultsOverlay.classList.contains('show')) hideResults(); });


function updateCamera(dt){
  shotT += dt;
  const shot = shots[shotIndex];
  if (autoCut && shotT >= shot.dur) startShot((shotIndex+1) % shots.length);
  const r = shots[shotIndex].fn(shots[shotIndex], shotT);
  const posLerp = shots[shotIndex].fixed ? 1 : 1 - Math.pow(0.0015, dt);
  const tgtLerp = 1 - Math.pow(0.0009, dt);
  camPos.lerp(r.pos, posLerp);
  camTgt.lerp(r.target, tgtLerp);
  camera.position.copy(camPos);
  camera.lookAt(camTgt);
}

// =================== STATS ===================
const fpsEl=document.getElementById('fps'), ftEl=document.getElementById('ft'),
  drawsEl=document.getElementById('draws'), trisEl=document.getElementById('tris'),
  resEl=document.getElementById('res'), spdEl=document.getElementById('spd'),
  ramEl=document.getElementById('ram'),
  minmaxEl=document.getElementById('minmax'), spark=document.getElementById('spark'),
  sctx=spark.getContext('2d');
const history=new Array(120).fill(60);
let frames=0, lastFpsT=performance.now(), fps=60, lastFrame=performance.now(), lastFrameMs=16.7;

function drawSpark(){
  const w=spark.width,h=spark.height; sctx.clearRect(0,0,w,h);
  const max=Math.max(90,...history);
  sctx.beginPath();
  history.forEach((v,i)=>{ const x=(i/(history.length-1))*w, y=h-(v/max)*h; i? sctx.lineTo(x,y):sctx.moveTo(x,y); });
  sctx.strokeStyle='#4dd0ff'; sctx.lineWidth=1.5; sctx.stroke();
  sctx.lineTo(w,h); sctx.lineTo(0,h); sctx.closePath();
  const g=sctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'rgba(77,208,255,0.28)'); g.addColorStop(1,'rgba(77,208,255,0)');
  sctx.fillStyle=g; sctx.fill();
  const gy=h-(60/max)*h;
  sctx.strokeStyle='rgba(92,255,177,0.35)'; sctx.setLineDash([3,3]); sctx.lineWidth=1;
  sctx.beginPath(); sctx.moveTo(0,gy); sctx.lineTo(w,gy); sctx.stroke(); sctx.setLineDash([]);
}

// The drawing buffer is locked to 1920x1080. Here we only compute the CSS size
// that fits that 16:9 canvas into the current screen, centered and letterboxed,
// so it looks right in both portrait and landscape.
function fitCanvas(){
  const vw = window.innerWidth, vh = window.innerHeight;
  const scale = Math.min(vw / RENDER_W, vh / RENDER_H);
  const cssW = Math.round(RENDER_W * scale);
  const cssH = Math.round(RENDER_H * scale);
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.style.left = Math.round((vw - cssW) / 2) + 'px';
  canvas.style.top  = Math.round((vh - cssH) / 2) + 'px';
}
window.addEventListener('resize', fitCanvas);

track.getPointAt(0, prevPos);
let prevTs = performance.now();
let elapsedTotal = 0;   // seconds since load, drives lighting & spinners

// FPS uncap / throughput mode. Browsers give web pages no way to disable vsync:
// requestAnimationFrame is hard-locked to the display's refresh/compositor, so on
// a 60Hz panel a normal loop can't exceed ~60fps regardless of GPU headroom (a
// high-refresh monitor raises that automatically). To measure raw render
// throughput past the refresh ceiling, "uncap" renders the scene many times per
// animation frame and times each render individually. Simulation still advances
// by real wall-clock dt once per animation frame, so the car moves normally; the
// extra renders just re-draw the same frame to stress the GPU/driver.
let uncap = false;
const UNCAP_RENDERS = 12;   // renders per animation frame when uncapped

// Motion is scaled by the frame-time delta, so speeds stay identical whatever
// rate the browser paints at.
function loop(ts){
  requestAnimationFrame(loop);
  const now = ts !== undefined ? ts : performance.now();
  const dt = Math.min((now - prevTs) / 1000, 0.05);
  prevTs = now;
  elapsedTotal += dt;

  // ---- simulation: advance once per animation frame with real dt ----
  placeCar(dt);
  for (let i=0;i<spinners.length;i++) spinners[i].rotation.y += dt * (0.6 + i*0.15);
  updateLighting(elapsedTotal);
  updateDynamicLights();
  updateCamera(dt);

  // ---- render: once normally, or many times back-to-back when uncapped ----
  const renders = uncap ? UNCAP_RENDERS : 1;
  for (let r=0; r<renders; r++){
    renderer.render(scene, camera);
    // Time each individual render so fps/frametime reflect true throughput.
    const tNow = performance.now();
    const ft = tNow - lastFrame; lastFrame = tNow; frames++;
    if (bench.running) benchSample(tNow, ft);
    lastFrameMs = ft;
  }

  if (now-lastFpsT>=500){
    fps=Math.round(frames*1000/(now-lastFpsT)); frames=0; lastFpsT=now;
    history.push(fps); history.shift();
    fpsEl.textContent=fps; fpsEl.className='v big '+(fps>=50?'good':fps>=30?'':'warn');
    minmaxEl.textContent=Math.min(...history)+'–'+Math.max(...history);
    drawSpark();
    // live memory readout (Chromium only; hidden gracefully elsewhere)
    const mem = memoryInfo();
    ramEl.textContent = mem ? (fmtMB(mem.usedMB) + ' / ' + fmtMB(mem.limitMB)) : 'n/a';
    ramEl.style.color = mem ? '#eaf3ff' : '#7a90a8';
  }
  ftEl.textContent=lastFrameMs.toFixed(1)+' ms';
  drawsEl.textContent=drawCalls();
  trisEl.textContent=triangleCount().toLocaleString();
  resEl.textContent=RENDER_W+'×'+RENDER_H;
  spdEl.textContent=Math.round(carSpeedKmh)+' km/h';
}
fitCanvas();
loop();
</script>
